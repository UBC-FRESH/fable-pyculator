name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,notebook,docs]'
      - name: Ruff
        run: python -m ruff check .
      - name: Pytest
        run: python -m pytest
      - name: Docs
        run: sphinx-build -b html docs _build/html -W
