name: Benchmark Evidence

on:
  workflow_dispatch:
    inputs:
      workbook_version:
        description: "FABLE workbook version"
        required: true
        default: "2021"
      mode:
        description: "Benchmark orchestration mode"
        required: true
        type: choice
        default: "evidence-only"
        options:
          - evidence-only
          - freshforge-plan
          - freshforge-run
      require_artifacts:
        description: "Fail when local generated-model artifacts are absent"
        required: true
        type: boolean
        default: false
      output_ref_strategy:
        description: "Output-ref strategy for FreshForge plan/run modes"
        required: true
        default: "output-columns"
      scenario_bundle:
        description: "Optional scenario bundle path for compact summary ingestion"
        required: false
        default: ""
      include_scenario_bundle_summary:
        description: "Ingest compact scenario-bundle FreshForge summary when present"
        required: true
        type: boolean
        default: false
      run_namespace:
        description: "Optional FreshForge run namespace"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  package-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Package validation evidence
        run: |
          set -euo pipefail
          args=(
            --workbook-version "${{ inputs.workbook_version }}"
            --mode "${{ inputs.mode }}"
            --output-ref-strategy "${{ inputs.output_ref_strategy }}"
            --json
          )
          if [[ "${{ inputs.require_artifacts }}" == "true" ]]; then
            args+=(--require-artifacts)
          fi
          if [[ -n "${{ inputs.scenario_bundle }}" ]]; then
            args+=(--bundle "${{ inputs.scenario_bundle }}")
          fi
          if [[ "${{ inputs.include_scenario_bundle_summary }}" == "true" ]]; then
            args+=(--include-scenario-bundle-summary)
          fi
          if [[ -n "${{ inputs.run_namespace }}" ]]; then
            args+=(--run-namespace "${{ inputs.run_namespace }}")
          fi
          python scripts/run_fable_benchmark_evidence.py "${args[@]}" | tee tmp/benchmark-evidence-summary.json

      - name: Upload compact evidence summaries
        uses: actions/upload-artifact@v4
        with:
          name: fable-validation-evidence-${{ inputs.workbook_version }}
          path: |
            tmp/validation-evidence/**
            tmp/benchmark-evidence-summary.json
          if-no-files-found: error
