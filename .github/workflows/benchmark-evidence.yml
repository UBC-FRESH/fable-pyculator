name: Benchmark Evidence

on:
  workflow_dispatch:
    inputs:
      workbook_version:
        description: "FABLE workbook version"
        required: true
        default: "2021"
      require_artifacts:
        description: "Fail when local generated-model artifacts are absent"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  package-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Package validation evidence
        run: |
          set -euo pipefail
          args=(
            --workbook-version "${{ inputs.workbook_version }}"
            --json
          )
          if [[ "${{ inputs.require_artifacts }}" == "true" ]]; then
            args+=(--require-artifacts)
          fi
          python scripts/package_fable_validation_evidence.py "${args[@]}" | tee tmp/validation-evidence-summary.json

      - name: Upload compact evidence summaries
        uses: actions/upload-artifact@v4
        with:
          name: fable-validation-evidence-${{ inputs.workbook_version }}
          path: |
            tmp/validation-evidence/**
            tmp/validation-evidence-summary.json
          if-no-files-found: error
